<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Artéline Search</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input { padding: 8px; width: 300px; }
    button { padding: 8px 12px; margin-left: 8px; }
    .artwork { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
  </style>
</head>
<body>

  <h1>Artéline Search</h1>
  <input type="text" id="searchInput" placeholder="Type keyword...">
  <button onclick="search()">Search</button>

  <div id="results"></div>

  <script>
    async function search() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return alert('Please type a keyword');

      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = 'Loading...';

      try {
        const res = await fetch(`http://localhost:3000/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();

        if (data.length === 0) {
          resultsDiv.innerHTML = 'No results found';
          return;
        }

        resultsDiv.innerHTML = '';
        data.forEach(art => {
          const div = document.createElement('div');
          div.className = 'artwork';
          div.innerHTML = `
            <h3>${art.title}</h3>
            <p>${art.description}</p>
            <p><strong>Tags:</strong> ${art.tags}</p>
            <p><strong>Price:</strong> $${art.price}</p>
          `;
          resultsDiv.appendChild(div);
        });

      } catch (err) {
        console.error(err);
        resultsDiv.innerHTML = 'Error fetching search results';
      }
    }
  </script>

</body>
</html>
